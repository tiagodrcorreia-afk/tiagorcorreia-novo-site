                    <div class="o-layout_item u-2/3@from-small">
                        <div class="c-popup-detail_summary u-text-big">
                            Located along the urban axis of Saint-Joseph Boulevard in Montreal's Plateau-Mont-Royal borough, Paul-Bruchési Elementary School is a prominent heritage building. Resonating with its original 1920s architecture by recalling the textures and colors of the ornamentation in concrete, the new addition is sober in design.

<br />
<br />
Covered in reflective material, the pedestrian passage connects the existing building to the new wooden extension. Located on the De Lanaudière Street side, the extension aligns with the school's existing lateral façade. While similar in proportion, the two volumes differ in scale and function, showcasing both contrast and harmonious coexistence.

<br />
<br />
On the courtyard side, the corner of the new volume, truncated at an angle, provides physical clearance from the existing school and offers a visual breakthrough to the neighboring church and its park, while highlighting the entrance to the school. On the sloping roof, a skylight cuts through the massive wooden structure, providing natural light. In keeping with the architectural concept, the landscaping design creates a playful, colorful environment, incorporating a green roof that reduces greenhouse gas emissions.
